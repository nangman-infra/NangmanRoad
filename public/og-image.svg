<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Nangman Road network route visualizer</title>
  <desc id="desc">A dark atmospheric network route map with cyan packet glow and coral warning accents.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#0F3B4C" />
      <stop offset="45%" stop-color="#07101F" />
      <stop offset="100%" stop-color="#050812" />
    </radialGradient>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)" />
  <path d="M120 420C260 285 355 345 486 246C616 148 742 179 848 284C948 384 1032 316 1110 210" fill="none" stroke="#5EE7FF" stroke-width="8" stroke-linecap="round" opacity="0.88" filter="url(#softGlow)" />
  <path d="M120 420C260 285 355 345 486 246C616 148 742 179 848 284C948 384 1032 316 1110 210" fill="none" stroke="#C9F7FF" stroke-width="2" stroke-linecap="round" opacity="0.92" />
  <g filter="url(#softGlow)">
    <circle cx="120" cy="420" r="18" fill="#5EE7FF" />
    <circle cx="486" cy="246" r="15" fill="#5EE7FF" />
    <circle cx="848" cy="284" r="15" fill="#F6C65B" />
    <circle cx="1110" cy="210" r="20" fill="#FF756C" />
  </g>
  <g fill="#F8FBFF">
    <text x="78" y="138" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" font-weight="700">Nangman Road</text>
    <text x="82" y="196" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="30" opacity="0.82">Install-free network route visualizer</text>
    <text x="82" y="528" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24" opacity="0.72">Measured from nearby distributed network probes</text>
  </g>
</svg>
